<!DOCTYPE html>
<html>
<head>
<title>Coby © 2026</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chatbox {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  width: 420px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

  height: 260px;
  overflow-y: auto;
  background: #020617;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
}

.loader {
  width: 25px;
  height: 25px;
  background: cyan;
  border-radius: 50%;
  animation: morph 1s infinite;
  display: none;
  margin: 5px auto;
}

@keyframes morph {
  0% {border-radius: 50%;}
  50% {
    border-radius: 10%;
    transform: rotate(180deg);
  }
  100% {border-radius: 50%;}
}

input {

  border-radius: 8px;

button {
  padding: 8px;

  border-radius: 10px;

}

.commands h3 {

  color: cyan;
}

.copyright {
  margin-top: 10px;
  background: #020617;
  padding: 6px;
  border-radius: 8px;

  font-size: 12px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="chatbox">

  <div id="output"></div>

  <div class="loader" id="loader"></div>

  <input id="input" placeholder="Ask Coby...">

  <button onclick="send()">Enter</button>

  <button onclick="clearChat()">Clear</button>

  <div class="commands">
    <h3>🧠 Coby Commands</h3>

    <p>
      Try:
      2+2,
      add 5 7,
      photosynthesis,
      noun,
      carbohydrates,
      apple,
      samsung,
      healthy foods,
      iphone models
    </p>
  </div>

  <div class="copyright">
    <marquee scrollamount="4">
      🤖 Coby © 2026 — Created & Developed by Ayaan Rashid
    </marquee>
  </div>

</div>

<script>

// 🧠 KEYWORDS
const KEYWORDS = {

  greetings: [
    "hi","hello","hey","yo",
    "sup","good morning",
    "good afternoon",
    "good evening"
  ],

  science: [
    "science","fact","space",
    "planet","earth","sun",
    "gravity"
  ],

  add: ["add","plus","sum"],
  subtract: ["subtract","minus","difference"],
  multiply: ["multiply","times","product"],
  divide: ["divide","over"],

  sqrt: ["square root","sqrt"],
  cbrt: ["cube root","cbrt"],

  area: ["area"],
  volume: ["volume"],

  happy: ["happy","good","great","fine"],
  sad: ["sad","bad","upset"],
  angry: ["angry","mad"],
  tired: ["tired","sleepy"]
};

// 🌍 KNOWLEDGE DATABASE
const KNOWLEDGE = {

  science: {

    "photosynthesis":
      "Photosynthesis is the process by which plants make food using sunlight.",

    "respiration":
      "Respiration is the process of releasing energy from food.",

    "atoms":
      "Atoms are tiny particles that make up matter.",

    "cells":
      "Cells are the basic unit of life.",

    "gravity":
      "Gravity pulls objects toward Earth."
  },

  maths: {

    "fraction":
      "A fraction represents part of a whole.",

    "prime number":
      "A prime number has only 2 factors: 1 and itself.",

    "perimeter":
      "Perimeter is the total length around a shape."
  },

  english: {

    "noun":
      "A noun is the name of a person, place, thing, or idea.",

    "verb":
      "A verb is an action word.",

    "adjective":
      "An adjective describes a noun."
  },

  nutrition: {

    "carbohydrates":
      "Carbohydrates give the body energy.",

    "proteins":
      "Proteins help build and repair muscles.",

    "fats":
      "Fats store energy and protect organs."
  },

  brands: {

    "apple":
      "Apple is a technology company known for iPhone, iPad, and Mac.",

    "samsung":
      "Samsung is a South Korean electronics company."
  },

  foods: {

    healthy:
      "Healthy foods include fruits, vegetables, milk, eggs, and nuts.",

    junk:
      "Junk foods include burgers, chips, cola, and fries."
  },

  phones: {

    apple:
      "iPhone 11, iPhone 12, iPhone 13, iPhone 14, iPhone 15",

    samsung:
      "Galaxy S21, Galaxy S22, Galaxy S23, Galaxy S24"
  }
};

// 🎲 RANDOM
function randomReply(list) {
  return list[
    Math.floor(Math.random() * list.length)
  ];
}

// 🧹 CLEAN
function clean(text) {

  return text
    .toLowerCase()
    .replace(/[^\w\s+\-*/]/g, "")
    .trim();
}

// 🔍 MATCH
function matchIntent(msg, list) {

  return list.some(word =>
    msg.includes(word)
  );
}

// 💬 APPEND
function append(text) {

  document.getElementById("output")
    .innerHTML += text + "<br>";
}

// 🤖 START MESSAGE
append(
  "<span style='color:cyan;'>🤖 Coby © 2026 — Developed by Ayaan Rashid</span><br><br>"
);

// 🤖 MAIN BRAIN
function getReply(input) {

  let msg = clean(input);

  msg = msg.replace(/\s+/g, " ");

  // 🔥 Direct math expressions
  let expression =
    msg.match(
      /-?\d+(\.\d+)?\s*[\+\-\*\/]\s*-?\d+(\.\d+)?/
    );

  if (expression) {

    try {
      return eval(expression[0]);
    }

    catch(e) {}
  }

  // 🔢 Numbers
  let nums = msg.match(/\d+/g);

  if (nums) {
    nums = nums.map(Number);
  }

  try {

    // 👋 Greetings
    if (
      matchIntent(msg, KEYWORDS.greetings)
    ) {

      return randomReply([
        "Hey! 🤖",
        "Hello 👋",
        "Yo 😎"
      ]);
    }

    // 📘 Knowledge Search
    for (let section in KNOWLEDGE) {

      for (let key in KNOWLEDGE[section]) {

        if (
          msg.includes(key) ||
          key.includes(msg)
        ) {

          return KNOWLEDGE[section][key];
        }
      }
    }

    // ➕ Add
    if (
      matchIntent(msg, KEYWORDS.add)
    ) {

      return nums.reduce(
        (a,b)=>a+b
      );
    }

    // ➖ Subtract
    if (
      matchIntent(msg, KEYWORDS.subtract)
    ) {

      return nums[0] - nums[1];
    }

    // ✖ Multiply
    if (
      matchIntent(msg, KEYWORDS.multiply)
    ) {

      return nums[0] * nums[1];
    }

    // ➗ Divide
    if (
      matchIntent(msg, KEYWORDS.divide)
    ) {

      return nums[0] / nums[1];
    }

    // √ Square Root
    if (
      matchIntent(msg, KEYWORDS.sqrt)
    ) {

      return Math.sqrt(nums[0]);
    }

    // ∛ Cube Root
    if (
      matchIntent(msg, KEYWORDS.cbrt)
    ) {

      return Math.cbrt(nums[0]);
    }

  } catch(e) {}

  // 🤖 Fallback
  return randomReply([

    "I'm still learning 🤖",

    "Try asking differently 😅",

    "I didn't understand that",

    "Can you rephrase it?"
  ]);
}

// 🚀 SEND
function send() {

  let input =
    document.getElementById("input").value;

  append("<b>You:</b> " + input);

  document.getElementById("loader")
    .style.display = "block";

  setTimeout(() => {

    let reply =
      getReply(input);

    document.getElementById("loader")
      .style.display = "none";

    append("<b>Coby:</b> " + reply);

  }, 400);

  document.getElementById("input").value = "";
}

// 🧹 CLEAR
function clearChat() {

  document.getElementById("output")
    .innerHTML =
    "<span style='color:cyan;'>🤖 Coby © 2026 — Developed by Ayaan Rashid</span><br><br>";
}

</script>

</body>
</html>
